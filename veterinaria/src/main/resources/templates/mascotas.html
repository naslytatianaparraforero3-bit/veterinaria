<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Veterinario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #f5f0ff 0%, #eef7f3 100%);
        min-height: 100vh;
        padding: 2rem;
        color: #2c2c3a;
      }

      /* ── Header ─────────────────────────────────────── */
      .header {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .header-icon {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #8b5cf6, #6d28d9);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        box-shadow: 0 4px 12px rgba(109, 40, 217, 0.3);
      }

      .header-text h1 {
        font-size: 1.7rem;
        font-weight: 700;
        color: #5b21b6;
        letter-spacing: -0.5px;
      }

      .header-text p {
        color: #9ca3af;
        font-size: 0.88rem;
        margin-top: 2px;
      }

      /* ── Contador ────────────────────────────────────── */
      .stats-bar {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .stat-chip {
        background: white;
        border-radius: 10px;
        padding: 0.6rem 1.2rem;
        font-size: 0.85rem;
        color: #6b7280;
        box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 500;
      }

      .stat-chip span.num {
        color: #7c3aed;
        font-weight: 700;
        font-size: 1rem;
      }

      /* ── Card Formulario ─────────────────────────────── */
      .card {
        background: white;
        border-radius: 16px;
        padding: 1.8rem;
        margin-bottom: 2rem;
        box-shadow: 0 4px 20px rgba(109, 40, 217, 0.08);
        border: 1px solid #ede9fe;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 1.4rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #f3f4f6;
      }

      .card-header .icon {
        font-size: 1.1rem;
      }

      .card-header h2 {
        font-size: 1rem;
        color: #5b21b6;
        font-weight: 600;
      }

      /* ── Grilla del formulario ───────────────────────── */
      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .form-group label {
        font-size: 0.8rem;
        color: #6b7280;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 9px 13px;
        border: 1.5px solid #e5e7eb;
        border-radius: 8px;
        font-size: 0.93rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        background: #fafafa;
        color: #1f2937;
      }

      .form-group input:focus,
      .form-group select:focus {
        border-color: #8b5cf6;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
        background: white;
      }

      .form-group input::placeholder {
        color: #c4c4cc;
      }

      /* ── Botón ───────────────────────────────────────── */
      .form-actions {
        margin-top: 1.4rem;
        display: flex;
        justify-content: flex-end;
      }

      .btn {
        background: linear-gradient(135deg, #8b5cf6, #6d28d9);
        color: white;
        border: none;
        padding: 10px 28px;
        border-radius: 9px;
        font-size: 0.93rem;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.2s;
        box-shadow: 0 4px 12px rgba(109, 40, 217, 0.35);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(109, 40, 217, 0.4);
      }

      .btn:active {
        transform: translateY(0);
      }

      /* ── Tabla ───────────────────────────────────────── */
      .table-wrapper {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(109, 40, 217, 0.08);
        border: 1px solid #ede9fe;
      }

      .table-header-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.2rem 1.5rem;
        border-bottom: 1px solid #f3f4f6;
      }

      .table-header-bar h2 {
        font-size: 1rem;
        color: #5b21b6;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .badge-count {
        background: #ede9fe;
        color: #6d28d9;
        font-size: 0.78rem;
        padding: 2px 10px;
        border-radius: 20px;
        font-weight: 600;
      }

      .table-scroll {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px;
      }

      thead {
        background: linear-gradient(135deg, #7c3aed, #5b21b6);
        color: white;
      }

      th {
        padding: 13px 18px;
        text-align: left;
        font-size: 0.82rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }

      td {
        padding: 12px 18px;
        font-size: 0.92rem;
        border-bottom: 1px solid #f3f4f6;
        color: #374151;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr:hover td {
        background: #f5f3ff;
      }

      /* ── Fila vacía ──────────────────────────────────── */
      .empty-row td {
        text-align: center;
        padding: 3rem 1rem;
        color: #9ca3af;
        font-size: 0.92rem;
      }

      .empty-icon {
        font-size: 2.5rem;
        display: block;
        margin-bottom: 0.5rem;
      }

      /* ── Badge Especie ───────────────────────────────── */
      .badge-especie {
        display: inline-block;
        padding: 3px 12px;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .perro   { background: #fef3c7; color: #d97706; }
      .gato    { background: #fce7f3; color: #db2777; }
      .conejo  { background: #ede9fe; color: #7c3aed; }
      .ave     { background: #d1fae5; color: #059669; }
      .otro    { background: #f3f4f6; color: #6b7280; }

      /* ── Badge Rol ───────────────────────────────────── */
      .badge-rol {
        display: inline-block;
        padding: 3px 12px;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 600;
      }

      .rol-cliente      { background: #dbeafe; color: #1d4ed8; }
      .rol-veterinario  { background: #dcfce7; color: #16a34a; }

      /* ── ID cell ─────────────────────────────────────── */
      .id-cell {
        font-family: monospace;
        color: #9ca3af;
        font-size: 0.85rem;
      }

      /* ── Correo cell ─────────────────────────────────── */
      .correo-cell {
        color: #7c3aed;
        font-size: 0.88rem;
      }

      /* ── Password mask ───────────────────────────────── */
      .pass-mask {
        letter-spacing: 3px;
        color: #9ca3af;
        font-size: 0.78rem;
      }
    </style>
  </head>

  <body>

    <!-- ── Encabezado ────────────────────────────────── -->
    <div class="header">
      <div class="header-icon"></div>
      <div class="header-text">
        <h1>Sistema Veterinario</h1>
        <p>Gestión de mascotas y usuarios registrados</p>
      </div>
    </div>

    <!-- ── Barra de estadísticas ─────────────────────── -->
    <div class="stats-bar">
      <div class="stat-chip">
        Total registrados:
        <span class="num" th:text="${#lists.size(mascotas)}">0</span>
      </div>
    </div>

    <!-- ── Formulario de registro ─────────────────────── -->
    <div class="card">
      <div class="card-header">
        <span class="icon"></span>
        <h2>Registrar nueva mascota</h2>
      </div>

      <form th:action="@{/mascotas}" th:object="${nuevaMascota}" method="post">
        <div class="form-grid">

          <div class="form-group">
            <label>Nombre de la mascota</label>
            <input
              type="text"
              th:field="*{nombre}"
              placeholder="Ej: Firulais"
              required
            />
          </div>

          <div class="form-group">
            <label>Especie</label>
            <select th:field="*{especie}" required>
              <option value="">-- Selecciona --</option>
              <option value="Perro"> Perro</option>
              <option value="Gato"> Gato</option>
              <option value="Conejo"> Conejo</option>
              <option value="Ave">Ave</option>
              <option value="Otro"> Otro</option>
            </select>
          </div>

          <div class="form-group">
            <label>Nombre del dueño</label>
            <input
              type="text"
              th:field="*{dueño}"
              placeholder="Ej: Ana Gómez"
              required
            />
          </div>

          <div class="form-group">
            <label>Correo electrónico</label>
            <input
              type="email"
              th:field="*{correo}"
              placeholder="Ej: ana@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label>Contraseña</label>
            <input
              type="password"
              th:field="*{contraseña}"
              placeholder="Mínimo 6 caracteres"
              required
              minlength="6"
            />
          </div>

          <div class="form-group">
            <label>Rol</label>
            <select th:field="*{rol}" required>
              <option value="">-- Selecciona --</option>
              <option value="cliente"> Cliente</option>
              <option value="veterinario"> Veterinario</option>
            </select>
          </div>

        </div>

        <div class="form-actions">
          <button type="submit" class="btn">
             Registrar mascota
          </button>
        </div>
      </form>
    </div>

    <!-- ── Tabla de mascotas desde la BD ─────────────── -->
    <div class="table-wrapper">
      <div class="table-header-bar">
        <h2>
          Mascotas registradas
          <span class="badge-count" th:text="${#lists.size(mascotas)} + ' registros'">0 registros</span>
        </h2>
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Especie</th>
              <th>Dueño</th>
              <th>Correo</th>
              <th>Contraseña</th>
              <th>Rol</th>
            </tr>
          </thead>
          <tbody>

            <!-- Fila vacía si no hay registros -->
            <tr class="empty-row" th:if="${#lists.isEmpty(mascotas)}">
              <td colspan="7">
                <span class="empty-icon"></span>
                No hay mascotas registradas aún.<br/>
                <small>Usa el formulario de arriba para agregar la primera.</small>
              </td>
            </tr>

            <!-- Filas de la base de datos -->
            <tr th:each="mascota : ${mascotas}">

              <td class="id-cell" th:text="${mascota.id}"></td>

              <td><strong th:text="${mascota.nombre}"></strong></td>

              <td>
                <span
                  class="badge-especie"
                  th:classappend="${mascota.especie == 'Perro'}  ? 'perro'  :
                                  (${mascota.especie == 'Gato'}   ? 'gato'   :
                                  (${mascota.especie == 'Conejo'} ? 'conejo' :
                                  (${mascota.especie == 'Ave'}    ? 'ave'    : 'otro')))"
                  th:text="${mascota.especie}">
                </span>
              </td>

              <td th:text="${mascota.dueño}"></td>

              <td class="correo-cell" th:text="${mascota.correo}"></td>

              <!-- Contraseña oculta por seguridad -->
              <td><span class="pass-mask">••••••••</span></td>

              <td>
                <span
                  class="badge-rol"
                  th:classappend="${mascota.rol == 'veterinario'} ? 'rol-veterinario' : 'rol-cliente'"
                  th:text="${mascota.rol}">
                </span>
              </td>

            </tr>

          </tbody>
        </table>
      </div>
    </div>

  </body>
</html>
