<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Sistema Veterinario</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f7f4;
        padding: 2rem;
        color: #2c2c2a;
      }

      h1 {
        font-size: 1.6rem;
        color: #8c4d99da;
        margin-bottom: 0.4rem;
        border-left: 4px solid #b593dd;
        padding-left: 0.8rem;
      }

      .subtitulo {
        color: #c9b1e9;
        font-size: 0.9rem;
        margin-bottom: 2rem;
        padding-left: 1rem;
      }

      /* ── Formulario ─────────────────────── */
      .card {
        background: white;
        border-radius: 10px;
        padding: 1.5rem;
        margin-bottom: 2rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
      }

      .card h2 {
        font-size: 1rem;
        color: #7f51e9bb;
        margin-bottom: 1rem;
        font-weight: 600;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
      }

      .form-group label {
        display: block;
        font-size: 0.82rem;
        color: #6b7280;
        margin-bottom: 4px;
        font-weight: 500;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 0.92rem;
        outline: none;
        transition: border 0.2s;
      }

      .form-group input:focus,
      .form-group select:focus {
        border-color: #977fbee5;
      }

      .btn {
        margin-top: 1.2rem;
        background: #8864b8de;
        color: white;
        border: none;
        padding: 9px 24px;
        border-radius: 6px;
        font-size: 0.92rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn:hover {
        background: #8c66c9d5;
      }

      /* ── Tabla ──────────────────────────── */
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
      }

      thead {
        background: #9761bbd0;
        color: white;
      }

      th,
      td {
        padding: 12px 18px;
        text-align: left;
        font-size: 0.93rem;
      }

      tbody tr:nth-child(even) {
        background: #e8f5f1;
      }
      tbody tr:hover {
        background: #c099ca;
      }

      .badge-especie {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .perro {
        background: #faad55d7;
        color: #db7230cb;
      }
      .gato {
        background: #f3abdd;
        color: #eeb9eebe;
      }
      .conejo {
        background: #9d70a3;
        color: #b61958cc;
      }
      .otro {
        background: #eeff8d;
        color: #3c94c7;
      }
    </style>
  </head>

  <body>
    <h1>Sistema Veterinario</h1>
    <p class="subtitulo">Gestión de mascotas registradas</p>

    <div class="card">
      <h2>Registrar nueva mascota</h2>
      <form th:action="@{/mascotas}" th:object="${nuevaMascota}" method="post">
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre de la mascota</label>
            <input
              type="text"
              th:field="*{nombre}"
              placeholder="Ej: Firulais"
              required
            />
          </div>

          <div class="form-group">
            <label>Especie</label>
            <select th:field="*{especie}" required>
              <option value="">-- Selecciona --</option>
              <option value="Perro">Perro</option>
              <option value="Gato">Gato</option>
              <option value="Conejo">Conejo</option>
              <option value="Ave">Ave</option>
              <option value="Otro">Otro</option>
            </select>
          </div>

          <div class="form-group">
            <label>Nombre del dueño</label>
            <input
              type="text"
              th:field="*{duenio}"
              placeholder="Ej: Ana Gómez"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn">Registrar mascota</button>
      </form>
    </div>

    <!-- ── Lista de mascotas ────────────────────────────────── -->
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Especie</th>
          <th>Dueño</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="mascota : ${mascotas}">
          <td th:text="${mascota.id}"></td>
          <td th:text="${mascota.nombre}"></td>
          <td>
            <span
              class="badge-especie"
              th:classappend="${mascota.especie == 'Perro'} ? 'perro' :
                                          (${mascota.especie == 'Gato'}  ? 'gato'  :
                                          (${mascota.especie == 'Conejo'}? 'conejo': 'otro'))"
              th:text="${mascota.especie}"
            >
            </span>
          </td>
          <td th:text="${mascota.duenio}"></td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
